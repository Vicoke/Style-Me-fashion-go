<!DOCTYPE html>
<html>
<head>
    <title>Contact Us - Style Me</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="contact">

    <h1>Contact Us</h1>
    <p class="subtitle">We’d love to hear from you. Reach out to us anytime!</p>

    <div class="contact-container">

        <!-- Contact Info -->
        <div class="contact-info">
            <h2>Get in Touch</h2>

            <p>📧 Email: styleme@gmail.com</p>
            <p>📞 Phone: 08059363201</p>
            <p>📍 Location: Anambra State, Nigeria</p>

            <a href="https://wa.me/2348059363201?text=Hello%20Style%20Me,%20I%20want%20to%20make%20an%20inquiry" target="_blank" class="whatsapp-btn">
                💬 Chat on WhatsApp
            </a>

            <a href="https://facebook.com/yourpage" target="_blank" class="facebook-btn">
                📘 Visit Facebook Page
            </a>
        </div>

        <!-- Contact Form -->
        <div class="contact-form">
            <h2>Send a Message</h2>

            <form onsubmit="sendMessage(event)">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message"></textarea>

                <button type="submit">Send Message</button>
            </form>

            <p id="success"></p>
        </div>

    </div>

</section>

<script>
function sendMessage(e) {
    e.preventDefault();
    document.getElementById("success").innerText =
        "✅ Message sent successfully!";
}
</script>

</body>
</html>
